<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:0.95"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Subtle inner shadow -->
  <rect width="512" height="512" rx="108" ry="108" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="4"/>
  <!-- Heart rate / flow line -->
  <polyline points="80,290 150,290 180,290 210,200 240,380 270,170 300,340 330,240 360,290 400,290 432,290"
    fill="none" stroke="url(#wave)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- W letter stylized -->
  <text x="256" y="195" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="150" fill="white" opacity="0.95">W</text>
  <!-- Subtitle -->
  <text x="256" y="435" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="52" fill="white" opacity="0.8" letter-spacing="8">FLOW</text>
</svg>